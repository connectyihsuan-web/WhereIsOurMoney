<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Where Is OUR Money</title>
    <style>
      #app-root {
        --bg: #F7F2EC;
        --surface: #FFFFFF;
        --ink: #3D3140;
        --ink-soft: #7A6E7D;
        --line: #E4D9CE;
        --rose: #C1607A;
        --rose-soft: #F1DCE1;
        --sage: #6F9481;
        --sage-soft: #DEEAE1;
        --gold: #C99A4A;

        font-family: 'Source Serif 4', 'Noto Serif TC', serif;
        color: var(--ink);
        background: var(--bg);
        min-height: 100vh;
        padding: 32px 16px 64px;
        box-sizing: border-box;
      }
      #app-root * { box-sizing: border-box; }
      #app-root .wrap { max-width: 640px; margin: 0 auto; }

      #app-root .masthead { text-align: center; margin-bottom: 28px; }
      #app-root .masthead .eyebrow {
        font-family: 'Inter', sans-serif;
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--ink-soft);
        margin-bottom: 6px;
      }
      #app-root .masthead h1 {
        font-family: 'Instrument Serif', 'Noto Serif TC', serif;
        font-weight: 400;
        font-size: 34px;
        margin: 0;
        letter-spacing: 0.01em;
      }
      #app-root .masthead .names-edit {
        margin-top: 10px;
        display: flex;
        justify-content: center;
        gap: 8px;
        align-items: center;
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        color: var(--ink-soft);
      }
      #app-root .names-edit input {
        font-family: 'Inter', sans-serif;
        border: none;
        border-bottom: 1px dashed var(--line);
        background: transparent;
        text-align: center;
        width: 72px;
        padding: 2px 4px;
        color: var(--ink);
        font-size: 13px;
      }
      #app-root .names-edit input:focus { outline: none; border-color: var(--rose); }

      /* Receipt-tape balance card */
      #app-root .receipt {
        background: var(--surface);
        border-radius: 4px;
        padding: 26px 24px 22px;
        position: relative;
        box-shadow: 0 1px 0 var(--line), 0 12px 28px -18px rgba(61,49,64,0.35);
        margin-bottom: 24px;
        overflow: hidden;
      }
      #app-root .receipt::before, #app-root .receipt::after {
        content: "";
        position: absolute;
        left: 0; right: 0;
        height: 10px;
        background:
          radial-gradient(circle at 6px 5px, var(--bg) 5px, transparent 5.5px) repeat-x;
        background-size: 16px 10px;
      }
      #app-root .receipt::before { top: -5px; }
      #app-root .receipt::after { bottom: -5px; transform: rotate(180deg); }

      #app-root .receipt-label {
        font-family: 'Inter', sans-serif;
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--ink-soft);
        text-align: center;
      }
      #app-root .receipt-balance {
        text-align: center;
        margin: 10px 0 4px;
      }
      #app-root .receipt-balance .amount {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 40px;
        font-weight: 600;
        color: var(--rose);
      }
      #app-root .receipt-balance .amount.sage { color: var(--sage); }
      #app-root .receipt-balance .who {
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        color: var(--ink-soft);
        margin-top: 2px;
      }
      #app-root .receipt-balance .even { font-size: 16px; color: var(--ink-soft); font-family: 'Inter', sans-serif; padding: 12px 0; }

      #app-root .receipt-totals {
        display: flex;
        justify-content: center;
        gap: 28px;
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px dashed var(--line);
        font-family: 'Inter', sans-serif;
      }
      #app-root .receipt-totals .col { text-align: center; }
      #app-root .receipt-totals .label { font-size: 11px; color: var(--ink-soft); letter-spacing: 0.05em; }
      #app-root .receipt-totals .val { font-family: 'IBM Plex Mono', monospace; font-size: 17px; margin-top: 3px; }

      /* Add form */
      #app-root .add-card {
        background: var(--surface);
        border-radius: 10px;
        padding: 18px;
        margin-bottom: 22px;
        box-shadow: 0 1px 0 var(--line);
        font-family: 'Inter', sans-serif;
      }
      #app-root .add-row { display: flex; gap: 10px; margin-bottom: 10px; }
      #app-root .add-row:last-child { margin-bottom: 0; }
      #app-root .field { flex: 1; }
      #app-root .field label {
        display: block;
        font-size: 11px;
        color: var(--ink-soft);
        margin-bottom: 4px;
        letter-spacing: 0.04em;
      }
      #app-root input[type=text], #app-root input[type=number], #app-root input[type=date], #app-root select {
        width: 100%;
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--bg);
        color: var(--ink);
      }
      #app-root input:focus, #app-root select:focus { outline: none; border-color: var(--rose); }

      /* Checkbox layout next to amount */
      #app-root .amount-field-container {
        display: flex;
        flex-direction: column;
        flex: 1;
      }
      #app-root .amount-input-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      #app-root .split-checkbox-label {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 13px;
        color: var(--ink-soft);
        cursor: pointer;
        white-space: nowrap;
        user-select: none;
      }
      #app-root .split-checkbox-label input {
        cursor: pointer;
        width: 16px;
        height: 16px;
        accent-color: var(--rose);
      }

      #app-root .payer-toggle { display: flex; gap: 6px; }
      #app-root .payer-btn {
        flex: 1;
        padding: 9px 6px;
        border-radius: 7px;
        border: 1px solid var(--line);
        background: var(--bg);
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        cursor: pointer;
        color: var(--ink-soft);
        transition: all .15s ease;
      }
      #app-root .payer-btn.active-a { background: var(--rose-soft); border-color: var(--rose); color: var(--rose); font-weight: 600; }
      #app-root .payer-btn.active-b { background: var(--sage-soft); border-color: var(--sage); color: var(--sage); font-weight: 600; }

      #app-root .submit-btn {
        width: 100%;
        margin-top: 12px;
        padding: 11px;
        border-radius: 7px;
        border: none;
        background: var(--ink);
        color: var(--bg);
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        letter-spacing: 0.02em;
      }
      #app-root .submit-btn:hover { background: var(--rose); }
      #app-root .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

      /* Category summary */
      #app-root .section-title {
        font-family: 'Inter', sans-serif;
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--ink-soft);
        margin: 26px 0 10px 2px;
      }
      #app-root .cat-row {
        display: flex;
        align-items: center;
        gap: 10px;
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        margin-bottom: 8px;
      }
      #app-root .cat-name { width: 70px; flex-shrink: 0; color: var(--ink-soft); }
      #app-root .cat-bar-track { flex: 1; height: 8px; background: var(--line); border-radius: 4px; overflow: hidden; }
      #app-root .cat-bar-fill { height: 100%; background: var(--gold); border-radius: 4px; }
      #app-root .cat-amt { width: 76px; text-align: right; font-family: 'IBM Plex Mono', monospace; flex-shrink: 0; }

      /* Ledger list */
      #app-root .ledger-list { display: flex; flex-direction: column; gap: 8px; }
      #app-root .entry {
        display: flex;
        align-items: center;
        gap: 12px;
        background: var(--surface);
        padding: 12px 14px;
        border-radius: 8px;
        border-left: 3px solid var(--line);
      }
      #app-root .entry.payer-a { border-left-color: var(--rose); }
      #app-root .entry.payer-b { border-left-color: var(--sage); }
      #app-root .entry .tag {
        font-family: 'Inter', sans-serif;
        font-size: 11px;
        padding: 3px 8px;
        border-radius: 20px;
        background: var(--bg);
        color: var(--ink-soft);
        flex-shrink: 0;
      }
      #app-root .entry .main { flex: 1; min-width: 0; }
      #app-root .entry .note { font-family: 'Inter', sans-serif; font-size: 14px; }
      #app-root .entry .meta { font-family: 'Inter', sans-serif; font-size: 11px; color: var(--ink-soft); margin-top: 2px; }
      #app-root .entry .amt { font-family: 'IBM Plex Mono', monospace; font-size: 15px; flex-shrink: 0; }
      #app-root .entry .del {
        background: none; border: none; color: var(--ink-soft); cursor: pointer; font-size: 16px; flex-shrink: 0; padding: 2px 4px;
        font-family: 'Inter', sans-serif;
      }
      #app-root .entry .del:hover { color: var(--rose); }

      #app-root .empty {
        text-align: center;
        font-family: 'Inter', sans-serif;
        color: var(--ink-soft);
        font-size: 14px;
        padding: 30px 10px;
        background: var(--surface);
        border-radius: 8px;
      }
      #app-root .footnote {
        text-align: center;
        font-family: 'Inter', sans-serif;
        font-size: 11px;
        color: var(--ink-soft);
        margin-top: 30px;
      }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Source+Serif+4:wght@400;600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
</head>
<body>

<div id="app-root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const CATEGORIES = [
  { id: 'food', label: '餐飲', emoji: '🍜' },
  { id: 'fun', label: '娛樂', emoji: '🎬' },
  { id: 'transport', label: '交通', emoji: '🚗' },
  { id: 'life', label: '生活', emoji: '🛍️' },
  { id: 'travel', label: '旅行', emoji: '✈️' },
  { id: 'spotify', label: 'Spotify', emoji: '🎵' },
  { id: 'other', label: '其他', emoji: '🧾' },
];

const ENTRIES_KEY = 'couple-ledger:entries';
const NAMES_KEY = 'couple-ledger:names';

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function fmt(n) {
  return 'NT$' + Math.round(n).toLocaleString('zh-Hant');
}

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function App() {
  const [entries, setEntries] = useState(() => {
    const saved = localStorage.getItem(ENTRIES_KEY);
    return saved ? JSON.parse(saved) : [];
  });
  
  const [names, setNames] = useState(() => {
    const saved = localStorage.getItem(NAMES_KEY);
    return saved ? JSON.parse(saved) : { a: '苡瑄', b: '佳勳' };
  });

  const [amount, setAmount] = useState('');
  const [needSplit, setNeedSplit] = useState(true);
  const [payer, setPayer] = useState('a');
  const [category, setCategory] = useState('food');
  const [note, setNote] = useState('');
  const [date, setDate] = useState(todayStr());

  useEffect(() => {
    localStorage.setItem(ENTRIES_KEY, JSON.stringify(entries));
  }, [entries]);

  useEffect(() => {
    localStorage.setItem(NAMES_KEY, JSON.stringify(names));
  }, [names]);

  const handleAdd = () => {
    const amt = parseFloat(amount);
    if (!amt || amt <= 0) return;
    const entry = {
      id: uid(),
      amount: amt,
      needSplit,
      payer,
      category,
      note: note.trim(),
      date,
      createdAt: Date.now(),
    };
    setEntries([entry, ...entries]);
    setAmount('');
    setNeedSplit(true);
    setNote('');
  };

  const handleDelete = (id) => {
    setEntries(entries.filter(e => e.id !== id));
  };

  const handleNameChange = (who, val) => {
    setNames({ ...names, [who]: val || (who === 'a' ? '苡瑄' : '佳勳') });
  };

  let totalA = 0;
  let totalB = 0;
  let splitDiff = 0;

  entries.forEach(e => {
    if (e.payer === 'a') totalA += e.amount;
    else totalB += e.amount;

    if (e.needSplit !== false) {
      if (e.payer === 'a') splitDiff += e.amount / 2;
      else splitDiff -= e.amount / 2;
    }
  });

  const total = totalA + totalB;
  const half = Math.abs(splitDiff);

  const catTotals = CATEGORIES.map(c => ({
    ...c,
    total: entries.filter(e => e.category === c.id).reduce((s, e) => s + e.amount, 0),
  })).filter(c => c.total > 0).sort((a, b) => b.total - a.total);
  const maxCat = Math.max(1, ...catTotals.map(c => c.total));

  const sortedEntries = [...entries].sort((a, b) => b.createdAt - a.createdAt);

  return (
    <div className="wrap">
      <div className="masthead">
        <div className="eyebrow">Shared Ledger</div>
        <h1>Where Is OUR Money</h1>
        <div className="names-edit">
          <span>雙方：</span>
          <input type="text" value={names.a} onChange={e => handleNameChange('a', e.target.value)} />
          <span>&amp;</span>
          <input type="text" value={names.b} onChange={e => handleNameChange('b', e.target.value)} />
        </div>
      </div>

      <div className="receipt">
        <div className="receipt-label">目前結算</div>
        <div className="receipt-balance">
          {half < 1 ? (
            <div className="even">🌹</div>
          ) : (
            <React.Fragment>
              <div className={"amount " + (splitDiff > 0 ? "" : "sage")}>{fmt(half)}</div>
              <div className="who">
                {splitDiff > 0
                  ? `${names.b} 要付給 ${names.a}`
                  : `${names.a} 要付給 ${names.b}`}
              </div>
            </React.Fragment>
          )}
        </div>
        <div className="receipt-totals">
          <div className="col">
            <div className="label">{names.a} 共付</div>
            <div className="val">{fmt(totalA)}</div>
          </div>
          <div className="col">
            <div className="label">{names.b} 共付</div>
            <div className="val">{fmt(totalB)}</div>
          </div>
          <div className="col">
            <div className="label">總花費</div>
            <div className="val">{fmt(total)}</div>
          </div>
        </div>
      </div>

      <div className="add-card">
        <div className="add-row">
          <div className="field">
            <label>金額</label>
            <div className="amount-input-row">
              <input
                type="number"
                inputMode="decimal"
                placeholder="0"
                value={amount}
                onChange={e => setAmount(e.target.value)}
              />
              <label className="split-checkbox-label">
                <input
                  type="checkbox"
                  checked={needSplit}
                  onChange={e => setNeedSplit(e.target.checked)}
                />
                需要平分 (/2)
              </label>
            </div>
          </div>
          <div className="field">
            <label>日期</label>
            <input type="date" value={date} onChange={e => setDate(e.target.value)} />
          </div>
        </div>
        <div className="add-row">
          <div className="field">
            <label>誰付的</label>
            <div className="payer-toggle">
              <button
                type="button"
                className={"payer-btn " + (payer === 'a' ? 'active-a' : '')}
                onClick={() => setPayer('a')}
              >{names.a}</button>
              <button
                type="button"
                className={"payer-btn " + (payer === 'b' ? 'active-b' : '')}
                onClick={() => setPayer('b')}
              >{names.b}</button>
            </div>
          </div>
          <div className="field">
            <label>分類</label>
            <select value={category} onChange={e => setCategory(e.target.value)}>
              {CATEGORIES.map(c => (
                <option key={c.id} value={c.id}>{c.emoji} {c.label}</option>
              ))}
            </select>
          </div>
        </div>
        <div className="add-row">
          <div className="field">
            <label>備註（選填）</label>
            <input type="text" placeholder="例如：晚餐、全聯" value={note} onChange={e => setNote(e.target.value)} />
          </div>
        </div>
        <button className="submit-btn" onClick={handleAdd} disabled={!amount}>
          ＋ 加入紀錄
        </button>
      </div>

      {catTotals.length > 0 && (
        <React.Fragment>
          <div className="section-title">分類統計</div>
          {catTotals.map(c => (
            <div className="cat-row" key={c.id}>
              <div className="cat-name">{c.emoji} {c.label}</div>
              <div className="cat-bar-track">
                <div className="cat-bar-fill" style={{ width: (c.total / maxCat * 100) + '%' }} />
              </div>
              <div className="cat-amt">{fmt(c.total)}</div>
            </div>
          ))}
        </React.Fragment>
      )}

      <div className="section-title">所有紀錄</div>
      <div className="ledger-list">
        {sortedEntries.length === 0 && (
          <div className="empty">✍️</div>
        )}
        {sortedEntries.map(e => {
          const cat = CATEGORIES.find(c => c.id === e.category) || CATEGORIES[CATEGORIES.length - 1];
          const payerName = e.payer === 'a' ? names.a : names.b;
          return (
            <div className={"entry payer-" + e.payer} key={e.id}>
              <div className="tag">{cat.emoji} {cat.label}</div>
              <div className="main">
                <div className="note">{e.note || payerName + ' 的花費'}</div>
                <div className="meta">
                  {e.date} · {payerName}付款 {e.needSplit === false ? '（不平分）' : ''}
                </div>
              </div>
              <div className="amt">{fmt(e.amount)}</div>
              <button className="del" onClick={() => handleDelete(e.id)} title="刪除">✕</button>
            </div>
          );
        })}
      </div>

      <div className="footnote">
        資料會自動儲存於本機
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App />);
</script>

</body>
</html>
