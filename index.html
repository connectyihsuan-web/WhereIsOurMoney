<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Where Is OUR Money</title>
    <style>
      #app-root {
        --bg: #F7F2EC;
        --surface: #FFFFFF;
        --ink: #3D3140;
        --ink-soft: #7A6E7D;
        --line: #E4D9CE;
        --rose: #C1607A;
        --rose-soft: #F1DCE1;
        --sage: #6F9481;
        --sage-soft: #DEEAE1;
        --gold: #C99A4A;

        font-family: 'Source Serif 4', 'Noto Serif TC', serif;
        color: var(--ink);
        background: var(--bg);
        min-height: 100vh;
        padding: 32px 16px 64px;
        box-sizing: border-box;
      }
      #app-root * { box-sizing: border-box; }
      #app-root .wrap { max-width: 640px; margin: 0 auto; }

      #app-root .masthead { text-align: center; margin-bottom: 24px; }
      #app-root .masthead .icon-badge {
        display: inline-block;
        background: var(--rose-soft);
        color: var(--rose);
        font-size: 16px;
        padding: 6px 12px;
        border-radius: 20px;
        margin-bottom: 10px;
        box-shadow: 0 2px 6px rgba(193,96,122,0.15);
      }
      #app-root .masthead .eyebrow {
        font-family: 'Inter', sans-serif;
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--ink-soft);
        margin-bottom: 4px;
      }
      #app-root .masthead h1 {
        font-family: 'Instrument Serif', 'Noto Serif TC', serif;
        font-weight: 400;
        font-size: 38px;
        margin: 0;
        letter-spacing: 0.01em;
      }
      #app-root .masthead .names-edit {
        margin-top: 14px;
        display: flex;
        justify-content: center;
        gap: 12px;
        align-items: center;
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        color: var(--ink-soft);
        max-width: 320px;
        margin-left: auto;
        margin-right: auto;
      }
      #app-root .masthead .name-field {
        flex: 1;
        display: flex;
        align-items: center;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 6px 10px;
        box-shadow: 0 1px 2px rgba(61,49,64,0.04);
        transition: all 0.2s;
      }
      #app-root .masthead .name-field:focus-within {
        border-color: var(--rose);
        box-shadow: 0 0 0 3px var(--rose-soft);
      }
      #app-root .masthead input {
        font-family: 'Inter', sans-serif;
        border: none;
        background: transparent;
        text-align: center;
        width: 100%;
        color: var(--ink);
        font-size: 14px;
        font-weight: 500;
      }
      #app-root .masthead input:focus { outline: none; }
      #app-root .masthead .amp {
        font-family: 'Instrument Serif', serif;
        font-size: 20px;
        color: var(--rose);
      }

      /* Month Filter Bar */
      #app-root .month-filter-bar {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        margin-bottom: 20px;
        flex-wrap: wrap;
        font-family: 'Inter', sans-serif;
      }
      #app-root .month-btn {
        background: var(--surface);
        border: 1px solid var(--line);
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 500;
        color: var(--ink-soft);
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 1px 2px rgba(61,49,64,0.02);
      }
      #app-root .month-btn:hover {
        border-color: var(--rose);
        color: var(--rose);
      }
      #app-root .month-btn.active {
        background: var(--ink);
        border-color: var(--ink);
        color: var(--bg);
        font-weight: 600;
      }

      /* Receipt-tape balance card */
      #app-root .receipt {
        background: var(--surface);
        border-radius: 6px;
        padding: 28px 24px 24px;
        position: relative;
        box-shadow: 0 1px 0 var(--line), 0 12px 28px -18px rgba(61,49,64,0.35);
        margin-bottom: 24px;
        overflow: hidden;
      }
      #app-root .receipt::before, #app-root .receipt::after {
        content: "";
        position: absolute;
        left: 0; right: 0;
        height: 10px;
        background:
          radial-gradient(circle at 6px 5px, var(--bg) 5px, transparent 5.5px) repeat-x;
        background-size: 16px 10px;
      }
      #app-root .receipt::before { top: -5px; }
      #app-root .receipt::after { bottom: -5px; transform: rotate(180deg); }

      #app-root .receipt-label {
        font-family: 'Inter', sans-serif;
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--ink-soft);
        text-align: center;
      }
      #app-root .receipt-balance {
        text-align: center;
        margin: 10px 0 6px;
      }
      #app-root .receipt-balance .amount {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 42px;
        font-weight: 600;
        color: var(--rose);
      }
      #app-root .receipt-balance .amount.sage { color: var(--sage); }
      #app-root .receipt-balance .who {
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        font-weight: 500;
        color: var(--ink-soft);
        margin-top: 4px;
      }
      #app-root .receipt-balance .even { font-size: 18px; color: var(--ink-soft); font-family: 'Inter', sans-serif; padding: 12px 0; }

      #app-root .receipt-totals {
        display: flex;
        justify-content: center;
        gap: 32px;
        margin-top: 18px;
        padding-top: 18px;
        border-top: 1px dashed var(--line);
        font-family: 'Inter', sans-serif;
      }
      #app-root .receipt-totals .col { text-align: center; }
      #app-root .receipt-totals .label { font-size: 11px; color: var(--ink-soft); letter-spacing: 0.05em; }
      #app-root .receipt-totals .val { font-family: 'IBM Plex Mono', monospace; font-size: 17px; margin-top: 3px; font-weight: 500; }

      /* Add form */
      #app-root .add-card {
        background: var(--surface);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 24px;
        box-shadow: 0 4px 20px rgba(61,49,64,0.04), 0 1px 0 var(--line);
        font-family: 'Inter', sans-serif;
      }
      #app-root .add-row { display: flex; gap: 12px; margin-bottom: 12px; }
      #app-root .add-row:last-child { margin-bottom: 0; }
      #app-root .field { flex: 1; }
      #app-root .field label {
        display: block;
        font-size: 11px;
        color: var(--ink-soft);
        margin-bottom: 6px;
        letter-spacing: 0.04em;
        font-weight: 500;
      }
      #app-root input[type=text], #app-root input[type=number], #app-root input[type=date], #app-root select {
        width: 100%;
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--bg);
        color: var(--ink);
        transition: all 0.2s;
      }
      #app-root input:focus, #app-root select:focus { outline: none; border-color: var(--rose); background: var(--surface); box-shadow: 0 0 0 3px var(--rose-soft); }

      #app-root .amount-input-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      #app-root .split-options {
        display: flex;
        gap: 14px;
        align-items: center;
        font-size: 13px;
        color: var(--ink-soft);
        cursor: pointer;
        user-select: none;
      }
      #app-root .split-options label {
        display: flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
        margin-bottom: 0 !important;
        font-weight: normal !important;
      }
      #app-root .split-options input {
        cursor: pointer;
        width: 16px;
        height: 16px;
        accent-color: var(--rose);
      }

      #app-root .payer-toggle { display: flex; gap: 8px; }
      #app-root .payer-btn {
        flex: 1;
        padding: 10px 8px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: var(--bg);
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        cursor: pointer;
        color: var(--ink-soft);
        transition: all .2s ease;
      }
      #app-root .payer-btn.active-a { background: var(--rose-soft); border-color: var(--rose); color: var(--rose); font-weight: 600; box-shadow: 0 2px 4px rgba(193,96,122,0.15); }
      #app-root .payer-btn.active-b { background: var(--sage-soft); border-color: var(--sage); color: var(--sage); font-weight: 600; box-shadow: 0 2px 4px rgba(111,148,129,0.15); }

      #app-root .submit-btn {
        width: 100%;
        margin-top: 14px;
        padding: 12px;
        border-radius: 8px;
        border: none;
        background: var(--ink);
        color: var(--bg);
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        letter-spacing: 0.02em;
        transition: background 0.2s, transform 0.1s;
      }
      #app-root .submit-btn:hover { background: var(--rose); }
      #app-root .submit-btn:active { transform: scale(0.99); }
      #app-root .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

      /* Chart container */
      #app-root .chart-card {
        background: var(--surface);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 24px;
        box-shadow: 0 4px 20px rgba(61,49,64,0.04), 0 1px 0 var(--line);
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #app-root .chart-container {
        position: relative;
        width: 240px;
        height: 240px;
        margin: 10px 0;
      }

      /* Section title */
      #app-root .section-title {
        font-family: 'Inter', sans-serif;
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--ink-soft);
        margin: 28px 0 10px 2px;
        font-weight: 600;
      }

      /* Ledger list */
      #app-root .ledger-list { display: flex; flex-direction: column; gap: 10px; }
      #app-root .entry {
        display: flex;
        align-items: center;
        gap: 14px;
        background: var(--surface);
        padding: 14px 16px;
        border-radius: 10px;
        border-left: 4px solid var(--line);
        box-shadow: 0 2px 6px rgba(61,49,64,0.03);
        transition: transform 0.15s;
      }
      #app-root .entry:hover { transform: translateY(-1px); }
      #app-root .entry.payer-a { border-left-color: var(--rose); }
      #app-root .entry.payer-b { border-left-color: var(--sage); }
      #app-root .entry .tag {
        font-family: 'Inter', sans-serif;
        font-size: 11px;
        padding: 4px 10px;
        border-radius: 20px;
        background: var(--bg);
        color: var(--ink-soft);
        flex-shrink: 0;
        font-weight: 500;
      }
      #app-root .entry .main { flex: 1; min-width: 0; }
      #app-root .entry .note { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; color: var(--ink); }
      #app-root .entry .meta { font-family: 'Inter', sans-serif; font-size: 11px; color: var(--ink-soft); margin-top: 3px; }
      #app-root .entry .amt { font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 600; flex-shrink: 0; }
      #app-root .entry .del {
        background: none; border: none; color: var(--ink-soft); cursor: pointer; font-size: 16px; flex-shrink: 0; padding: 4px 6px;
        font-family: 'Inter', sans-serif; border-radius: 4px; transition: background 0.15s, color 0.15s;
      }
      #app-root .entry .del:hover { background: var(--rose-soft); color: var(--rose); }

      #app-root .empty {
        text-align: center;
        font-family: 'Inter', sans-serif;
        color: var(--ink-soft);
        font-size: 14px;
        padding: 36px 10px;
        background: var(--surface);
        border-radius: 10px;
        box-shadow: 0 1px 2px rgba(61,49,64,0.02);
      }
      #app-root .footnote {
        text-align: center;
        font-family: 'Inter', sans-serif;
        font-size: 11px;
        color: var(--ink-soft);
        margin-top: 36px;
        letter-spacing: 0.05em;
      }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <!-- 引入 Chart.js 圖表庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Source+Serif+4:wght@400;600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
</head>
<body>

<div id="app-root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzKNzjM2fRBud4UHI2RtQFpjt8eCx1fmqfPSOdX88BOwszCfv0RL1fMXasWkcClpqNp/exec';

const CATEGORIES = [
  { id: 'food', label: '餐飲', emoji: '🍜', color: '#C1607A' },
  { id: 'fun', label: '娛樂', emoji: '🎬', color: '#C99A4A' },
  { id: 'transport', label: '交通', emoji: '🚗', color: '#6F9481' },
  { id: 'life', label: '生活', emoji: '🛍️', color: '#886F94' },
  { id: 'travel', label: '旅行', emoji: '✈️', color: '#5B82A8' },
  { id: 'spotify', label: 'Spotify', emoji: '🎵', color: '#529E75' },
  { id: 'other', label: '其他', emoji: '🧾', color: '#948E7E' },
];

const NAMES_KEY = 'couple-ledger:names';

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function fmt(n) {
  return 'NT$' + Math.round(n).toLocaleString('zh-Hant');
}

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function App() {
  const [entries, setEntries] = useState([]);
  const [loading, setLoading] = useState(true);
  const [names, setNames] = useState(() => {
    const saved = localStorage.getItem(NAMES_KEY);
    return saved ? JSON.parse(saved) : { a: '苡瑄', b: '佳勳' };
  });

  const [selectedMonth, setSelectedMonth] = useState('all'); // 'all' 或 'YYYY-MM'

  const [amount, setAmount] = useState('');
  const [splitType, setSplitType] = useState('half'); // 'half' (平分), 'full' (不平分/全額)
  const [payer, setPayer] = useState('a');
  const [category, setCategory] = useState('food');
  const [note, setNote] = useState('');
  const [date, setDate] = useState(todayStr());

  const chartRef = useRef(null);
  const chartInstanceRef = useRef(null);

  const fetchEntries = async () => {
    try {
      const res = await fetch(SCRIPT_URL);
      const data = await res.json();
      const formatted = data.map(item => ({
        id: String(item.id),
        amount: Number(item.amount),
        splitType: String(item.split_type || 'half'),
        payer: String(item.payer),
        category: String(item.category),
        note: String(item.note || ''),
        date: String(item.date),
        createdAt: Number(item.created_at || Date.now())
      }));
      setEntries(formatted);
    } catch (e) {
      console.error('讀取失敗', e);
    } finally {
      setLoading(false);
    }
  };

  useEffect(() => {
    fetchEntries();
  }, []);

  useEffect(() => {
    localStorage.setItem(NAMES_KEY, JSON.stringify(names));
  }, [names]);

  // 取得所有出現過的月份列表（降冪排列）
  const availableMonths = Array.from(new Set(entries.map(e => e.date ? e.date.slice(0, 7) : ''))).filter(Boolean).sort().reverse();

  // 根據選擇的月份篩選紀錄
  const filteredEntries = entries.filter(e => {
    if (selectedMonth === 'all') return true;
    return e.date && e.date.startsWith(selectedMonth);
  });

  // 計算分類統計數據（基於篩選後的紀錄）
  const catTotals = CATEGORIES.map(c => ({
    ...c,
    total: filteredEntries.filter(e => e.category === c.id).reduce((s, e) => s + e.amount, 0),
  })).filter(c => c.total > 0);

  // 繪製圓餅圖
  useEffect(() => {
    if (!chartRef.current) return;
    if (chartInstanceRef.current) {
      chartInstanceRef.current.destroy();
    }

    if (catTotals.length === 0) return;

    const ctx = chartRef.current.getContext('2d');
    chartInstanceRef.current = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: catTotals.map(c => c.emoji + ' ' + c.label),
        datasets: [{
          data: catTotals.map(c => c.total),
          backgroundColor: catTotals.map(c => c.color),
          borderWidth: 2,
          borderColor: '#FFFFFF'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'bottom',
            labels: {
              boxWidth: 12,
              font: {
                family: 'Inter, sans-serif',
                size: 12
              },
              color: '#3D3140'
            }
          }
        },
        cutout: '65%'
      }
    });

    return () => {
      if (chartInstanceRef.current) {
        chartInstanceRef.current.destroy();
      }
    };
  }, [filteredEntries]);

  const handleAdd = async () => {
    const amt = parseFloat(amount);
    if (!amt || amt <= 0) return;
    const newEntry = {
      id: uid(),
      amount: amt,
      split_type: splitType,
      payer,
      category,
      note: note.trim(),
      date,
      created_at: Date.now(),
    };

    setLoading(true);
    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(newEntry)
      });
      setAmount('');
      setSplitType('half');
      setNote('');
      setTimeout(fetchEntries, 1500);
    } catch (e) {
      alert('新增失敗');
      setLoading(false);
    }
  };

  const handleDelete = async (id) => {
    if (!confirm('確定要刪除這筆紀錄嗎？')) return;
    setLoading(true);
    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'delete', id: id })
      });
      setTimeout(fetchEntries, 1500);
    } catch (e) {
      alert('刪除失敗');
      setLoading(false);
    }
  };

  const handleNameChange = (who, val) => {
    setNames({ ...names, [who]: val || (who === 'a' ? '苡瑄' : '佳勳') });
  };

  let totalA = 0;
  let totalB = 0;
  let splitDiff = 0;

  filteredEntries.forEach(e => {
    if (e.payer === 'a') totalA += e.amount;
    else totalB += e.amount;

    if (e.splitType === 'half') {
      if (e.payer === 'a') splitDiff += e.amount / 2;
      else splitDiff -= e.amount / 2;
    } else if (e.splitType === 'full') {
      if (e.payer === 'a') splitDiff += e.amount;
      else splitDiff -= e.amount;
    }
  });

  const total = totalA + totalB;
  const half = Math.abs(splitDiff);

  const sortedEntries = [...filteredEntries].sort((a, b) => b.createdAt - a.createdAt);

  return (
    <div className="wrap">
      <div className="masthead">
        <div className="icon-badge">👥</div>
        <div className="eyebrow">Shared Ledger</div>
        <h1>Where Is OUR Money</h1>
        <div className="names-edit">
          <div className="name-field">
            <input type="text" value={names.a} onChange={e => handleNameChange('a', e.target.value)} />
          </div>
          <span className="amp">&amp;</span>
          <div className="name-field">
            <input type="text" value={names.b} onChange={e => handleNameChange('b', e.target.value)} />
          </div>
        </div>
      </div>

      {/* 月份篩選列 */}
      {availableMonths.length > 0 && (
        <div className="month-filter-bar">
          <button
            className={"month-btn " + (selectedMonth === 'all' ? 'active' : '')}
            onClick={() => setSelectedMonth('all')}
          >
            全部歷史
          </button>
          {availableMonths.map(m => (
            <button
              key={m}
              className={"month-btn " + (selectedMonth === m ? 'active' : '')}
              onClick={() => setSelectedMonth(m)}
            >
              {m.replace('-', '年')}月
            </button>
          ))}
        </div>
      )}

      <div className="receipt">
        <div className="receipt-label">{selectedMonth === 'all' ? '目前總結算' : `${selectedMonth.replace('-', '年')}月結算`} {loading ? '（同步中...）' : ''}</div>
        <div className="receipt-balance">
          {half < 1 ? (
            <div className="even">🌹 帳目剛好平衡</div>
          ) : (
            <React.Fragment>
              <div className={"amount " + (splitDiff > 0 ? "" : "sage")}>{fmt(half)}</div>
              <div className="who">
                {splitDiff > 0
                  ? `${names.b} 要付給 ${names.a}`
                  : `${names.a} 要付給 ${names.b}`}
              </div>
            </React.Fragment>
          )}
        </div>
        <div className="receipt-totals">
          <div className="col">
            <div className="label">{names.a} 共付</div>
            <div className="val">{fmt(totalA)}</div>
          </div>
          <div className="col">
            <div className="label">{names.b} 共付</div>
            <div className="val">{fmt(totalB)}</div>
          </div>
          <div className="col">
            <div className="label">總花費</div>
            <div className="val">{fmt(total)}</div>
          </div>
        </div>
      </div>

      <div className="add-card">
        <div className="add-row">
          <div className="field">
            <label>金額</label>
            <div className="amount-input-row">
              <input
                type="number"
                inputMode="decimal"
                placeholder="0"
                value={amount}
                onChange={e => setAmount(e.target.value)}
              />
              <div className="split-options">
                <label>
                  <input
                    type="radio"
                    name="splitType"
                    checked={splitType === 'half'}
                    onChange={() => setSplitType('half')}
                  />
                  平分 (/2)
                </label>
                <label>
                  <input
                    type="radio"
                    name="splitType"
                    checked={splitType === 'full'}
                    onChange={() => setSplitType('full')}
                  />
                  不平分 (全額)
                </label>
              </div>
            </div>
          </div>
          <div className="field">
            <label>日期</label>
            <input type="date" value={date} onChange={e => setDate(e.target.value)} />
          </div>
        </div>
        <div className="add-row">
          <div className="field">
            <label>誰付的</label>
            <div className="payer-toggle">
              <button
                type="button"
                className={"payer-btn " + (payer === 'a' ? 'active-a' : '')}
                onClick={() => setPayer('a')}
              >{names.a}</button>
              <button
                type="button"
                className={"payer-btn " + (payer === 'b' ? 'active-b' : '')}
                onClick={() => setPayer('b')}
              >{names.b}</button>
            </div>
          </div>
          <div className="field">
            <label>分類</label>
            <select value={category} onChange={e => setCategory(e.target.value)}>
              {CATEGORIES.map(c => (
                <option key={c.id} value={c.id}>{c.emoji} {c.label}</option>
              ))}
            </select>
          </div>
        </div>
        <div className="add-row">
          <div className="field">
            <label>備註（選填）</label>
            <input type="text" placeholder="例如：晚餐、幫買東西" value={note} onChange={e => setNote(e.target.value)} />
          </div>
        </div>
        <button className="submit-btn" onClick={handleAdd} disabled={!amount || loading}>
          {loading ? '處理中...' : '＋ 加入紀錄'}
        </button>
      </div>

      {catTotals.length > 0 && (
        <React.Fragment>
          <div className="section-title">📊 支出比例圖表</div>
          <div className="chart-card">
            <div className="chart-container">
              <canvas ref={chartRef}></canvas>
            </div>
          </div>
        </React.Fragment>
      )}

      <div className="section-title">📝 紀錄列表 {selectedMonth !== 'all' ? `（${selectedMonth.replace('-', '年')}月）` : ''}</div>
      <div className="ledger-list">
        {sortedEntries.length === 0 && !loading && (
          <div className="empty">✍️ 這個月份還沒有紀錄</div>
        )}
        {sortedEntries.map(e => {
          const cat = CATEGORIES.find(c => c.id === e.category) || CATEGORIES[CATEGORIES.length - 1];
          const payerName = e.payer === 'a' ? names.a : names.b;
          let splitText = '';
          if (e.splitType === 'full') splitText = '（不平分）';

          return (
            <div className={"entry payer-" + e.payer} key={e.id}>
              <div className="tag">{cat.emoji} {cat.label}</div>
              <div className="main">
                <div className="note">{e.note || payerName + ' 的花費'}</div>
                <div className="meta">
                  {e.date} · {payerName}付款 {splitText}
                </div>
              </div>
              <div className="amt">{fmt(e.amount)}</div>
              <button className="del" onClick={() => handleDelete(e.id)} title="刪除">✕</button>
            </div>
          );
        })}
      </div>

      <div className="footnote">
        資料已連動至 Google 試算表
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App />);
</script>

</body>
</html>
